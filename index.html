<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coração 3D Interativo</title>
    <!-- Fonte moderna do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #080711;
            --accent-pink: #ff2a74;
            --accent-purple: #8a2be2;
            --text-color: #ffffff;
            --panel-bg: rgba(15, 12, 30, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Efeito de fundo gradiente animado */
        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 42, 116, 0.15) 0%, rgba(138, 43, 226, 0.08) 50%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(80px);
        }

        /* Canvas do Three.js */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* SVG Invisível para extrair o caminho */
        #svg-source {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* Interface do Usuário (Overlay) */
        .ui-container {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 2.5rem;
            pointer-events: none;
        }

        header {
            pointer-events: auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-pink), #ff7eb3, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(255, 42, 116, 0.25);
        }

        p.subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        /* Painel de Controle Glassmórfico */
        .control-panel {
            align-self: flex-start;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .control-panel:hover {
            border-color: rgba(255, 42, 116, 0.3);
            box-shadow: 0 20px 50px rgba(255, 42, 116, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Botão estilizado */
        .btn {
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-purple) 100%);
            border: none;
            color: white;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 42, 116, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 42, 116, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Instruções de Navegação */
        .instructions {
            position: absolute;
            bottom: 2.5rem;
            right: 2.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 0.75rem 1.25rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            pointer-events: none;
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-pink);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px var(--accent-pink); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <canvas id="webgl-canvas"></canvas>

    <!-- SVG com ID path contendo o formato do coração -->
    <svg id="svg-source" viewBox="0 0 600 600">
        <!-- Caminho de coração calibrado para caber nos eixos do JS -->
        <path id="path" d="M 300, 140 C 240, 40 100, 40 100, 200 C 100, 320 220, 400 300, 480 C 380, 400 500, 320 500, 200 C 500, 40 360, 40 300, 140 Z" />
    </svg>

    <div class="ui-container">
        <header>
            <h1>Heart Particles</h1>
            <p class="subtitle">Tridimensional SVG Path Extraction & Animation</p>
        </header>

        <div class="control-panel">
            <div class="control-group">
                <label>Interações</label>
                <button class="btn" id="btn-replay">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    Reiniciar Animação
                </button>
            </div>
            <div class="control-group">
                <label>Controles 3D</label>
                <p style="font-size: 0.8rem; color: rgba(255,255,255,0.4); line-height: 1.4;">
                    Clique e arraste com o mouse para girar o coração em 3D. Role a roda do mouse para dar zoom.
                </p>
            </div>
        </div>
    </div>

    <div class="instructions">
        <span class="dot-pulse"></span>
        Arraste para rotacionar
    </div>

    <!-- Scripts Externos (Three.js, GSAP e OrbitControls) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // Declarando globalmente para que o script heart.js as enxergue
        let tl = gsap.timeline();
        
        // Configuração inicial do Three.js
        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x080711, 0.0015);

        // Câmera posicionada para enquadrar o coração (centro original em 300, -276, 0)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(300, -276, 500);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Controle de órbita 3D
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(300, -276, 0); // Foca no centro do coração

        // Criando uma textura circular brilhante em memória para as partículas
        function createParticleGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 50, 120, 0.8)');
            gradient.addColorStop(0.5, 'rgba(138, 43, 226, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const particleTexture = createParticleGlowTexture();
    </script>

    <!-- Agora carregamos o heart.js, que preencherá o array "vertices" e a timeline "tl" -->
    <script src="heart.js"></script>

    <script>
        // Após o heart.js ter rodado, criamos a geometria com base nos vértices gerados
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(vertices.length * 3);

        // Preenche o buffer inicial
        for (let i = 0; i < vertices.length; i++) {
            positions[i * 3] = vertices[i].x;
            positions[i * 3 + 1] = vertices[i].y;
            positions[i * 3 + 2] = vertices[i].z;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Material brilhante para as partículas
        const material = new THREE.PointsMaterial({
            size: 8,
            map: particleTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            color: 0xffffff
        });

        // Adiciona o sistema de partículas à cena
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Loop de Renderização
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            // Atualiza os controles
            controls.update();

            // Sincroniza a posição animada do GSAP de volta na geometria do Three.js
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < vertices.length; i++) {
                posAttr.setXYZ(i, vertices[i].x, vertices[i].y, vertices[i].z);
            }
            posAttr.needsUpdate = true;

            // Rotação sutil automática do sistema inteiro para dinamismo 3D
            const time = clock.getElapsedTime();
            particleSystem.rotation.y = Math.sin(time * 0.2) * 0.15;
            particleSystem.rotation.x = Math.cos(time * 0.1) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        // Tratamento de Redimensionamento da Tela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Botão para reiniciar a animação
        document.getElementById('btn-replay').addEventListener('click', () => {
            tl.restart();
        });
    </script>
</body>
</html>
