<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coração 3D Interativo</title>
    <!-- Fonte moderna do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --accent-pink: #ff2a74;
            --accent-purple: #8a2be2;
            --text-color: #ffffff;
            --panel-bg: rgba(15, 12, 30, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ocultado para manter o fundo 100% preto completo */
        .background-glow {
            display: none;
        }

        /* Canvas do Three.js */
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* SVG Invisível para extrair o caminho */
        #svg-source {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }

        /* Interface do Usuário (Overlay) */
        .ui-container {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 2.5rem;
            pointer-events: none;
        }

        header {
            pointer-events: auto;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-pink), #ff7eb3, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(255, 42, 116, 0.25);
        }

        p.subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        /* Painel de Controle Glassmórfico */
        .control-panel {
            align-self: flex-start;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            pointer-events: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .control-panel:hover {
            border-color: rgba(255, 42, 116, 0.3);
            box-shadow: 0 20px 50px rgba(255, 42, 116, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Botão estilizado */
        .btn {
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-purple) 100%);
            border: none;
            color: white;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 42, 116, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 42, 116, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Instruções de Navegação */
        .instructions {
            position: absolute;
            bottom: 2.5rem;
            right: 2.5rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 0.75rem 1.25rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            pointer-events: none;
        }

        .dot-pulse {
            width: 8px;
            height: 8px;
            background-color: var(--accent-pink);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px var(--accent-pink); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        /* Responsividade Mobile-First */
        @media (max-width: 768px) {
            .ui-container {
                padding: 1.5rem 1rem;
                align-items: center;
            }
            header {
                text-align: center;
                margin-top: 1rem;
            }
            h1 {
                font-size: 1.8rem;
            }
            p.subtitle {
                font-size: 0.75rem;
            }
            .control-panel {
                align-self: center;
                width: calc(100% - 2rem);
                max-width: 300px;
                padding: 1.25rem;
                gap: 0.75rem;
                margin-bottom: 3.5rem;
            }
            .btn {
                padding: 0.75rem 1.25rem;
                font-size: 0.9rem;
            }
            .instructions {
                bottom: 1rem;
                right: 50%;
                transform: translateX(50%);
                font-size: 0.75rem;
                white-space: nowrap;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <canvas id="webgl-canvas"></canvas>

    <!-- SVG com ID path contendo o formato do coração -->
    <svg id="svg-source" viewBox="0 0 600 600">
        <!-- Caminho de coração calibrado para caber nos eixos do JS -->
        <path id="path" d="M 300, 140 C 240, 40 100, 40 100, 200 C 100, 320 220, 400 300, 480 C 380, 400 500, 320 500, 200 C 500, 40 360, 40 300, 140 Z" />
    </svg>



    <!-- Scripts Externos (Three.js, GSAP e OrbitControls) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // Configuração inicial do Three.js
        const canvas = document.querySelector('#webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.0015);

        // Câmera posicionada para enquadrar o coração (centro original em 300, -276, 0)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(300, -276, 500);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Controle de órbita 3D
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(300, -276, 0); // Foca no centro do coração

        // Declarar material e timeline no escopo global
        let material;
        let tl;

        // Função para ajustar câmera e tamanho de partículas para Mobile-First
        function adjustLayout() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
            
            if (width < 768) {
                // Afasta a câmera no celular para o coração caber inteiro (tela vertical)
                camera.position.z = Math.max(650, 480 * (768 / width));
                if (material && material.uniforms) {
                    material.uniforms.uSize.value = 14.0; // Partículas maiores em celulares
                }
            } else {
                camera.position.z = 500;
                if (material && material.uniforms) {
                    material.uniforms.uSize.value = 8.0; // Partículas menores no desktop
                }
            }
        }
        adjustLayout();

        // Criando uma textura circular brilhante em memória para as partículas
        // Criada em branco puro para que a cor final aplicada pelo Shader tenha brilho e saturação máxima!
        function createParticleGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.25)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        const particleTexture = createParticleGlowTexture();
    </script>

    <!-- Agora carregamos o heart.js, que preencherá as listas de dados no escopo global -->
    <script src="heart.js"></script>

     <script>
        // Custom Shaders para performance 60fps na GPU
        const vertexShader = `
            uniform float uProgress;
            uniform float uMorphProgress;
            uniform float uSize;
            uniform float uTime;
            uniform vec3 uMouse;
            attribute vec3 aStart;
            attribute vec3 aTarget2;
            attribute float aRandomDelay;
            attribute float aDuration;
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                // Calcula o tempo local da partícula considerando seu atraso individual
                float localTime = uProgress - aRandomDelay;
                float progress = clamp(localTime / aDuration, 0.0, 1.0);
                
                // Easing Power2 In-Out (Quadrática) idêntica à animação original
                float t = progress;
                float ease = t < 0.5 ? 2.0 * t * t : 1.0 - pow(-2.0 * t + 2.0, 2.0) / 2.0;
                
                vec3 start = aStart;
                
                // Posição final desejada: faz a interpolação (morph) entre o Coração (position) e o Infinito (aTarget2)
                vec3 target = mix(position, aTarget2, uMorphProgress);
                
                // Movimento linear a partir da nuvem dispersa
                vec3 mixedPos = mix(start, target, ease);
                
                // --- Interação física de repulsão por cursor/toque ---
                float dist = distance(mixedPos, uMouse);
                if (dist < 160.0) {
                    float force = smoothstep(160.0, 0.0, dist);
                    vec3 dir = normalize(mixedPos - uMouse + vec3(0.0001));
                    mixedPos += dir * force * 55.0; // Empurra a poeira cósmica
                }
                
                // Projeção tridimensional
                vec4 mvPosition = modelViewMatrix * vec4(mixedPos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                
                // Atenuação de tamanho baseado no zoom/distância da câmera
                gl_PointSize = uSize * (300.0 / -mvPosition.z);
                
                // Cores verdes e roxo brilhantes representativas do universo (nebulosa cósmica)
                float heightFactor = clamp((position.y + 480.0) / 380.0, 0.0, 1.0);
                float noiseFactor = fract(sin(dot(position.xy, vec2(12.9898, 78.233))) * 43758.5453);
                float mixFactor = clamp(heightFactor + (noiseFactor - 0.5) * 0.45, 0.0, 1.0);
                
                vec3 spaceGreen = vec3(0.0, 1.0, 0.5);   // Verde galáctico brilhante
                vec3 spacePurple = vec3(0.7, 0.05, 1.0); // Roxo profundo estelar
                
                // Efeito aurora: as cores mudam lenta e suavemente ao longo do tempo (uTime)
                spaceGreen.r += sin(uTime * 0.2) * 0.35;
                spaceGreen.g += cos(uTime * 0.25) * 0.25;
                spaceGreen.b += sin(uTime * 0.3) * 0.25;
                
                spacePurple.r += cos(uTime * 0.2) * 0.3;
                spacePurple.g += sin(uTime * 0.3) * 0.35;
                spacePurple.b += cos(uTime * 0.25) * 0.25;
                
                spaceGreen = clamp(spaceGreen, 0.0, 1.0);
                spacePurple = clamp(spacePurple, 0.0, 1.0);
                
                vColor = mix(spaceGreen, spacePurple, mixFactor);
                
                // Transparência baseada na decolagem original
                vAlpha = smoothstep(0.0, 0.08, progress);
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTexture;
            varying vec3 vColor;
            varying float vAlpha;

            void main() {
                vec4 texColor = texture2D(uTexture, gl_PointCoord);
                if (texColor.a < 0.05) discard;
                gl_FragColor = vec4(vColor * texColor.rgb, texColor.a * vAlpha);
            }
        `;

        // Criamos os buffers de geometria na GPU com os arrays extraídos pelo heart.js (densidade 0.1)
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute('aStart', new THREE.Float32BufferAttribute(aStart, 3));
        geometry.setAttribute('aRandomDelay', new THREE.Float32BufferAttribute(aRandomDelay, 1));
        geometry.setAttribute('aDuration', new THREE.Float32BufferAttribute(aDuration, 1));
        geometry.setAttribute('aTarget2', new THREE.Float32BufferAttribute(aTarget2, 3));

        // Material personalizado rodando Shaders na GPU
        material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: {
                uProgress: { value: 0.0 },
                uMorphProgress: { value: 0.0 },
                uSize: { value: 8.0 },
                uTime: { value: 0.0 },
                uMouse: { value: new THREE.Vector3(9999.0, 9999.0, 9999.0) },
                uTexture: { value: particleTexture }
            },
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        adjustLayout(); // Aplica a calibração de tamanhos inicial

        // Adiciona o sistema de partículas à cena
        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Configuração de Raycasting do Mouse/Pointer para plano Z = 0
        const raycaster = new THREE.Raycaster();
        const mouseVector = new THREE.Vector2();
        const planeZ = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const mouse3D = new THREE.Vector3(9999, 9999, 9999);

        function updateMousePosition(event) {
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            mouseVector.x = (clientX / window.innerWidth) * 2 - 1;
            mouseVector.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouseVector, camera);
            raycaster.ray.intersectPlane(planeZ, mouse3D);
        }

        function resetMousePosition() {
            mouse3D.set(9999, 9999, 9999);
        }

        window.addEventListener('pointermove', updateMousePosition);
        window.addEventListener('pointerleave', resetMousePosition);
        window.addEventListener('pointercancel', resetMousePosition);
        window.addEventListener('touchmove', updateMousePosition, { passive: true });
        window.addEventListener('touchend', resetMousePosition, { passive: true });

        // Configuração da timeline do GSAP com sequenciamento de Morphing
        const maxDelay = (vertices.length / 3) * 0.002;
        const maxTime = maxDelay + 5.0; // Duração máxima original

        const animationState = { uProgress: 0.0, uMorphProgress: 0.0 };

        function updateUniforms() {
            material.uniforms.uProgress.value = animationState.uProgress;
            material.uniforms.uMorphProgress.value = animationState.uMorphProgress;
        }

        tl = gsap.timeline({ repeat: -1, yoyo: false });
        tl
            // 1. Forma o coração a partir da nuvem dispersa
            .to(animationState, {
                uProgress: maxTime,
                duration: 9.0,
                ease: "sine.inOut",
                onUpdate: updateUniforms
            })
            // 2. Mantém o coração formado para visualização
            .to({}, { duration: 3.0 })
            // 3. Transforma o coração no símbolo do infinito
            .to(animationState, {
                uMorphProgress: 1.0,
                duration: 7.0,
                ease: "power2.inOut",
                onUpdate: updateUniforms
            })
            // 4. Mantém o símbolo do infinito formado
            .to({}, { duration: 3.0 })
            // 5. Desfaz o infinito de volta em poeira estelar
            .to(animationState, {
                uProgress: 0.0,
                duration: 9.0,
                ease: "sine.inOut",
                onUpdate: updateUniforms
            })
            // 6. Reseta silenciosamente o morphing enquanto as partículas estão dispersas
            .to(animationState, {
                uMorphProgress: 0.0,
                duration: 0.1,
                onUpdate: updateUniforms
            })
            // 7. Mantém a nuvem dispersa antes de reiniciar o ciclo
            .to({}, { duration: 2.0 });

        // Loop de Renderização otimizado (0% de esforço da CPU em loops complexos)
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            // Atualiza os controles
            controls.update();

            // Atualizar uniforms de tempo e mouse
            const time = clock.getElapsedTime();
            material.uniforms.uTime.value = time;
            material.uniforms.uMouse.value.copy(mouse3D);

            // Rotação sutil automática do sistema inteiro para dinamismo 3D
            particleSystem.rotation.y = Math.sin(time * 0.15) * 0.1;
            particleSystem.rotation.x = Math.cos(time * 0.08) * 0.08;

            renderer.render(scene, camera);
        }
        animate();

        // Tratamento de Redimensionamento da Tela
        window.addEventListener('resize', adjustLayout);

        // Reiniciar a animação ao tocar/clicar em qualquer lugar da tela
        window.addEventListener('click', () => {
            animationState.uProgress = 0.0;
            animationState.uMorphProgress = 0.0;
            updateUniforms();
            tl.restart();
        });
    </script>
</body>
</html>
